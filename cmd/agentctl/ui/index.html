<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agentctl</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: #fffdf8;
      --ink: #1f1d18;
      --muted: #6c665b;
      --line: #d9cfbd;
      --accent: #0a7a5a;
      --danger: #a53a2a;
      --warn: #ad7a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: radial-gradient(circle at top left, #fffaf0 0%, var(--bg) 55%);
      color: var(--ink);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    h1, h2 { margin: 0 0 16px; }
    p { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 14px 30px rgba(31, 29, 24, 0.05);
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    input, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: white;
      color: var(--ink);
    }
    button {
      cursor: pointer;
      background: var(--ink);
      color: white;
      margin-top: 8px;
    }
    button.secondary {
      background: white;
      color: var(--ink);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .allow { background: #d6f5ea; color: var(--accent); }
    .deny { background: #f9d7d2; color: var(--danger); }
    .escalate, .pending { background: #fff1c2; color: var(--warn); }
    pre {
      white-space: pre-wrap;
      background: #201e19;
      color: #f8f3e9;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      min-height: 180px;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .actions button {
      width: auto;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>agentctl</h1>
    <p>Trace, replay, and resolve risky agent actions from one local screen.</p>

    <div class="grid">
      <section class="panel">
        <h2>Connection</h2>
        <label for="token">Bearer Token</label>
        <input id="token" placeholder="Optional for localhost">
        <div class="row" style="margin-top:12px;">
          <div>
            <label for="session">Session ID</label>
            <input id="session" placeholder="demo-1">
          </div>
          <div>
            <label for="policy">Replay Policy Path</label>
            <input id="policy" placeholder="agentctl.policy.yaml">
          </div>
        </div>
        <div class="actions" style="margin-top:12px;">
          <button id="loadTraces">Load Traces</button>
          <button id="runReplay" class="secondary">Replay Session</button>
          <button id="loadApprovals" class="secondary">Load Approvals</button>
        </div>
      </section>

      <section class="panel">
        <h2>Replay Output</h2>
        <pre id="replayOutput">No replay run yet.</pre>
      </section>
    </div>

    <section class="panel" style="margin-bottom:16px;">
      <h2>Traces</h2>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Session</th>
            <th>Action</th>
            <th>Verdict</th>
            <th>Risk</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody id="traceRows"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Approvals</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Session</th>
            <th>Action</th>
            <th>Status</th>
            <th>Reason</th>
            <th>Resolve</th>
          </tr>
        </thead>
        <tbody id="approvalRows"></tbody>
      </table>
    </section>
  </div>

  <script>
    const tokenEl = document.getElementById("token");
    const sessionEl = document.getElementById("session");
    const policyEl = document.getElementById("policy");
    const replayOutputEl = document.getElementById("replayOutput");
    const traceRowsEl = document.getElementById("traceRows");
    const approvalRowsEl = document.getElementById("approvalRows");

    tokenEl.value = localStorage.getItem("agentctl_token") || "";
    tokenEl.addEventListener("change", () => {
      localStorage.setItem("agentctl_token", tokenEl.value);
    });

    function headers(extra = {}) {
      const result = { ...extra };
      if (tokenEl.value) {
        result.Authorization = `Bearer ${tokenEl.value}`;
      }
      return result;
    }

    function badge(value) {
      return `<span class="pill ${value}">${value}</span>`;
    }

    async function loadTraces() {
      const session = sessionEl.value.trim();
      const query = session ? `?session_id=${encodeURIComponent(session)}` : "";
      const response = await fetch(`/v1/traces${query}`, { headers: headers() });
      const data = await response.json();

      traceRowsEl.innerHTML = (data.traces || []).map((trace) => `
        <tr>
          <td>${new Date(trace.timestamp).toLocaleString()}</td>
          <td>${trace.request.context?.session_id || ""}</td>
          <td>${trace.request.action}</td>
          <td>${badge(trace.verdict)}</td>
          <td>${trace.risk_score}</td>
          <td>${trace.reason}</td>
        </tr>
      `).join("");
    }

    async function loadApprovals() {
      const response = await fetch(`/v1/approvals?status=pending`, { headers: headers() });
      const data = await response.json();

      approvalRowsEl.innerHTML = (data.approvals || []).map((approval) => `
        <tr>
          <td>${approval.approval_id}</td>
          <td>${approval.session_id}</td>
          <td>${approval.action}</td>
          <td>${badge(approval.status)}</td>
          <td>${approval.reason}</td>
          <td class="actions">
            <button data-id="${approval.approval_id}" data-action="approve">Approve</button>
            <button class="secondary" data-id="${approval.approval_id}" data-action="deny">Deny</button>
          </td>
        </tr>
      `).join("");
    }

    approvalRowsEl.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-id]");
      if (!button) return;

      const action = button.dataset.action;
      const id = button.dataset.id;
      await fetch(`/v1/approvals/${id}/${action}`, {
        method: "POST",
        headers: headers({ "X-Agentctl-Actor": "ui-operator" }),
      });
      await loadApprovals();
    });

    async function runReplay() {
      const session = sessionEl.value.trim();
      if (!session) {
        replayOutputEl.textContent = "Session ID is required for replay.";
        return;
      }

      const response = await fetch(`/v1/replay`, {
        method: "POST",
        headers: headers({ "Content-Type": "application/json" }),
        body: JSON.stringify({
          session_id: session,
          policy_path: policyEl.value.trim() || undefined,
        }),
      });
      const data = await response.json();
      replayOutputEl.textContent = JSON.stringify(data, null, 2);
    }

    document.getElementById("loadTraces").addEventListener("click", loadTraces);
    document.getElementById("runReplay").addEventListener("click", runReplay);
    document.getElementById("loadApprovals").addEventListener("click", loadApprovals);
  </script>
</body>
</html>
